# ============================================================
# CodeLoom — Docker Compose
#
# Prerequisites:
#   - PostgreSQL (with pgvector + Apache AGE) running on the host
#   - .env file configured (copy from .env.example)
#
# Usage:
#   docker compose up -d --build     # build & start
#   docker compose logs -f           # follow logs
#   docker compose down              # stop & remove
#
# Nginx (on host):
#   Just add this to your existing server block:
#
#   location /codeloom/ {
#       proxy_pass http://127.0.0.1:9005/;
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#       proxy_http_version 1.1;
#       proxy_set_header Connection "";
#       proxy_buffering off;
#       proxy_read_timeout 600s;
#       client_max_body_size 100M;
#   }
# ============================================================

services:
  codeloom:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Sub-path under which the app is served (must match Nginx location)
        APP_BASE_PATH: ${APP_BASE_PATH:-/codeloom}
    container_name: codeloom
    restart: unless-stopped

    env_file:
      - .env

    environment:
      # Override host to reach the host machine's PostgreSQL from inside Docker
      POSTGRES_HOST: host.docker.internal
      # Ollama on the host machine (if used)
      OLLAMA_HOST: host.docker.internal
      # Backend port inside the container
      BACKEND_PORT: 9005

    ports:
      - "${CODELOOM_PORT:-9005}:9005"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Persist data across rebuilds
      - codeloom_uploads:/app/uploads
      - codeloom_outputs:/app/outputs
      - codeloom_data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  codeloom_uploads:
  codeloom_outputs:
  codeloom_data:
