# ============================================================
# CodeLoom — Nginx Location Block
#
# Paste this into your existing server block in
# /etc/nginx/sites-available/default (or your site config).
#
# After pasting:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Change /codeloom to any path you want.
# ============================================================

# ---- Copy everything below this line into your server { } block ----

location /codeloom/ {
    proxy_pass http://127.0.0.1:9005/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # SSE / streaming responses (chat, migration agent)
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;

    # File uploads (codebase zip, documents)
    client_max_body_size 100M;
}
